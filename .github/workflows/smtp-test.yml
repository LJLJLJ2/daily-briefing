name: SMTP 连通性测试

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 测试 QQ 邮箱 SMTP 连通性
        run: |
          import smtplib
          import socket

          print("1. DNS 解析 smtp.qq.com...")
          try:
              ip = socket.getaddrinfo("smtp.qq.com", 465)
              print(f"   OK: {ip[0][4]}")
          except Exception as e:
              print(f"   FAIL: {e}")

          print("2. TCP 连接 smtp.qq.com:465...")
          try:
              sock = socket.create_connection(("smtp.qq.com", 465), timeout=15)
              print("   OK: TCP 连接成功")
              sock.close()
          except Exception as e:
              print(f"   FAIL: {e}")

          print("3. SSL 握手...")
          try:
              server = smtplib.SMTP_SSL("smtp.qq.com", 465, timeout=15)
              print("   OK: SSL 握手成功")
              print(f"   Server banner: {server.ehlo_resp}")
              server.quit()
          except Exception as e:
              print(f"   FAIL: {e}")

          print("\n=== 结论 ===")
          print("如果三项全部 OK，整合可行。")
          print("如果第2/3项失败，QQ邮箱 SMTP 从 GitHub Actions 不可达，需换方案。")
        shell: python
